server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/models {
        proxy_pass http://ml-adapter:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://catalog:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
